<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrack - Trading Journal, Analytics & Replay for Traders</title>
  <meta
    name="description"
    content="Entrack helps you review trades, analyze performance, and manage your trading journal faster."
  >
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">

  <!-- Fonts for New Landing Page -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

  <!-- Apple touch icon -->

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
      background: #f8fafc;
    }
    body.dark-mode {
      background: #000000;
      color: #f8fafc;
    }
    #root { min-height: 100vh; width: 100%; }
  </style>
</head>
<body>
  <script>
    (function () {
      try {
        if (
          localStorage.getItem('entrack:darkMode') === 'true' ||
          localStorage.getItem(['trade', 'analytics:darkMode'].join('')) === 'true'
        ) {
          document.body.classList.add('dark-mode');
        }
      } catch (error) {
        // Ignore storage access errors and let React apply the synced theme.
      }
    })();
  </script>

  <!-- React app root -->
  <div id="root"></div>

  <!-- Vite entry script -->
  <script type="module" src="/src/main.jsx"></script>

  <!-- Manifest for PWA -->
  <link rel="manifest" href="/manifest.json">
</body>
</html>
