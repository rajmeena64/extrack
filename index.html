<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrack Dashboard</title>
  <meta
    name="description"
    content="Entrack helps you review trades, analyze performance, and manage your trading journal faster."
  >
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">

  <!-- Scripts and Fonts for New Landing Page -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "primary": "var(--primary)",
            "on-primary": "var(--on-primary)",
            "primary-container": "var(--primary-container)",
            "on-primary-container": "var(--on-primary-container)",
            "background": "var(--background)",
            "on-background": "var(--on-surface)",
            "surface": "var(--surface)",
            "on-surface": "var(--on-surface)",
            "surface-variant": "var(--surface-variant)",
            "on-surface-variant": "var(--on-surface-variant)",
            "surface-container": "var(--surface-container)",
            "surface-container-low": "var(--surface-container-low)",
            "surface-container-lowest": "var(--surface-container-lowest)",
            "surface-container-high": "var(--surface-container-high)",
            "outline": "var(--outline)",
            "outline-variant": "var(--outline-variant)",
            "error": "var(--error)",
            "on-error": "var(--on-error)",
          },
          "borderRadius": {
            "DEFAULT": "0.125rem",
            "lg": "0.25rem",
            "xl": "0.5rem",
            "full": "0.75rem"
          },
          "spacing": {
            "margin-desktop": "32px",
            "xs": "4px",
            "margin-mobile": "16px",
            "base": "4px",
            "gutter": "16px",
            "lg": "24px",
            "md": "16px",
            "xl": "32px",
            "sm": "8px"
          },
          "fontFamily": {
            "display-lg": ["Inter"],
            "label-caps": ["Inter"],
            "body-md": ["Inter"],
            "headline-lg": ["Inter"],
            "data-mono": ["JetBrains Mono"],
            "body-lg": ["Inter"],
            "headline-sm": ["Inter"],
            "headline-md": ["Inter"],
            "body-sm": ["Inter"]
          },
          "fontSize": {
            "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
            "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
            "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
            "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
            "data-mono": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
            "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
            "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
            "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
            "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}]
          }
        },
      },
    }
  </script>

  <!-- Apple touch icon -->

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
      background: #f8fafc;
    }
    body.dark-mode {
      background: #000000;
      color: #f8fafc;
    }
    #root { min-height: 100vh; width: 100%; }
  </style>
</head>
<body>
  <script>
    (function () {
      try {
        if (
          localStorage.getItem('entrack:darkMode') === 'true' ||
          localStorage.getItem(['trade', 'analytics:darkMode'].join('')) === 'true'
        ) {
          document.body.classList.add('dark-mode');
        }
      } catch (error) {
        // Ignore storage access errors and let React apply the synced theme.
      }
    })();
  </script>

  <!-- React app root -->
  <div id="root"></div>

  <!-- Vite entry script -->
  <script type="module" src="/src/main.jsx"></script>

  <!-- Manifest for PWA -->
  <link rel="manifest" href="/manifest.json">
</body>
</html>
