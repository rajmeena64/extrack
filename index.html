<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <title>TradeAnalytics Dashboard</title>
  <meta
    name="description"
    content="TradeAnalytics helps you review trades, analyze performance, and manage your trading journal faster."
  >
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">

  <!-- Manifest for PWA -->
  <link rel="manifest" href="/manifest.json">

  <!-- Apple touch icon -->

  <style>
    /* Basic loading styles */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
      background: #f8fafc;
    }
    #root { min-height: 100vh; width: 100%; }

    /* Loading spinner */
    .loading-spinner {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 9999;
      text-align: center;
    }
    .spinner {
      border: 4px solid rgba(0,0,0,0.1);
      border-radius: 50%;
      border-top: 4px solid #3498db;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: auto;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Loading screen -->
  <div id="loading" class="loading-spinner">
    <div class="spinner"></div>
    <p style="margin-top: 20px; color: #666;">Loading TradeAnalytics...</p>
  </div>

  <!-- React app root -->
  <div id="root"></div>

  <!-- Vite entry script -->
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
