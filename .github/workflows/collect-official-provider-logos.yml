name: Collect official provider SVG logos

on:
  pull_request:
    branches: [master]
    paths:
      - '.github/logo-crawler/**'
      - '.github/workflows/collect-official-provider-logos.yml'

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - part: 1
            start: 1
            end: 55
          - part: 2
            start: 56
            end: 110
          - part: 3
            start: 111
            end: 165
          - part: 4
            start: 166
            end: 220
          - part: 5
            start: 221
            end: 275
          - part: 6
            start: 276
            end: 330
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: .github/logo-crawler/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/logo-crawler/requirements.txt
          playwright install --with-deps chromium
      - name: Restore provider CSV
        run: |
          base64 -d .github/logo-crawler/providers_330.csv.gz.b64 | gzip -d > .github/logo-crawler/providers_330.csv
      - name: Extract official DOM SVG logos
        run: |
          python .github/logo-crawler/collect_dom_svg_logos.py \
            --input .github/logo-crawler/providers_330.csv \
            --output official_svg_output \
            --start ${{ matrix.start }} \
            --end ${{ matrix.end }} \
            --workers 4
      - name: Upload SVG package shard
        uses: actions/upload-artifact@v4
        with:
          name: official-provider-svg-part-${{ matrix.part }}
          path: |
            official_svg_output/**
            official_svg_output.zip
          if-no-files-found: error
          retention-days: 7
